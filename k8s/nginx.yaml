apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: vibeweb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: tenant-data
              mountPath: /data/tenants
              subPath: tenants
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: tenant-data
          persistentVolumeClaim:
            claimName: tenant-data
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: vibeweb
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: vibeweb
data:
  nginx.conf: |
    worker_processes auto;
    events { worker_connections 1024; }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      sendfile on;
      server {
        listen 80;
        server_name _;
        set $tenant_id $http_x_tenant_id;
        if ($tenant_id = "") { return 400 '{"error": "missing tenant id"}'; }
        if ($tenant_id !~ "^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$") { return 400 '{"error": "invalid tenant id"}'; }
        root /data/tenants/$tenant_id/public;
        disable_symlinks on;
        location ~ /\.\. { deny all; return 403; }
        location ~ /\.git { deny all; return 404; }
        location / { try_files $uri $uri/ /index.html; }
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
      }
    }
