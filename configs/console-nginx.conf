server {
    listen 80;
    root /usr/share/nginx/html;
    resolver 127.0.0.11 valid=10s;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to control-api
    location /api/ {
        proxy_pass http://control-api:1919/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy agent auth calls to agent-service
    location /agent-api/ {
        proxy_pass http://agent-service:3003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy WebSocket to agent-service
    location /ws/agent {
        proxy_pass http://agent-service:3003/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
