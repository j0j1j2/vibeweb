apiVersion: v1
kind: ServiceAccount
metadata:
  name: vibeweb-pod-manager
  namespace: vibeweb
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-manager
  namespace: vibeweb
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/status", "pods/exec", "pods/attach"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-manager-binding
  namespace: vibeweb
subjects:
  - kind: ServiceAccount
    name: vibeweb-pod-manager
roleRef:
  kind: Role
  name: pod-manager
  apiGroup: rbac.authorization.k8s.io
