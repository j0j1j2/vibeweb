http:
  middlewares:
    tenant-auth:
      forwardAuth:
        address: "http://control-api:1919/auth/validate"
        authResponseHeaders:
          - "X-Tenant-Id"

  routers:
    console:
      rule: "Host(`console.vibeweb.localhost`)"
      service: console
      entryPoints:
        - web
      priority: 200

    control-api:
      rule: "Host(`vibeweb.localhost`)"
      service: control-api
      entryPoints:
        - web

    function-runner:
      rule: "HostRegexp(`{subdomain:[a-z0-9-]+}.vibeweb.localhost`) && PathPrefix(`/api/`)"
      service: function-runner
      entryPoints:
        - web
      middlewares:
        - tenant-auth

    preview-ws:
      rule: "HostRegexp(`{subdomain:[a-z0-9-]+}.vibeweb.localhost`) && PathPrefix(`/ws`)"
      service: preview-server
      entryPoints:
        - web
      middlewares:
        - tenant-auth

    preview-static:
      rule: "HostRegexp(`{subdomain:[a-z0-9-]+}.vibeweb.localhost`) && Query(`preview=true`)"
      service: preview-server
      entryPoints:
        - web
      middlewares:
        - tenant-auth
      priority: 100

    agent-ws:
      rule: "HostRegexp(`{subdomain:[a-z0-9-]+}.vibeweb.localhost`) && PathPrefix(`/agent`)"
      service: agent-service
      entryPoints:
        - web
      middlewares:
        - tenant-auth
      priority: 90

    site-server:
      rule: "HostRegexp(`{subdomain:[a-z0-9-]+}.vibeweb.localhost`)"
      service: site-server
      entryPoints:
        - web
      middlewares:
        - tenant-auth
      priority: 1

  services:
    control-api:
      loadBalancer:
        servers:
          - url: "http://control-api:1919"

    function-runner:
      loadBalancer:
        servers:
          - url: "http://function-runner:3001"

    preview-server:
      loadBalancer:
        servers:
          - url: "http://preview-server:3002"

    agent-service:
      loadBalancer:
        servers:
          - url: "http://agent-service:3003"

    console:
      loadBalancer:
        servers:
          - url: "http://console:80"

    site-server:
      loadBalancer:
        servers:
          - url: "http://nginx:80"
