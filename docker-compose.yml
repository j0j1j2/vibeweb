services:
  traefik:
    image: traefik:v3.0
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./configs/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./configs/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    depends_on:
      control-api:
        condition: service_started

  nginx:
    image: nginx:alpine
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - tenant-data:/data/tenants:ro

  control-api:
    build:
      context: .
      dockerfile: packages/control-api/Dockerfile
    environment:
      - DATA_DIR=/data
      - ADMIN_API_KEY=${ADMIN_API_KEY:-vibeweb-admin-secret}
    ports:
      - "1919:1919"
    volumes:
      - app-data:/data
      - tenant-data:/data/tenants

  function-runner:
    build:
      context: .
      dockerfile: packages/function-runner/Dockerfile
    environment:
      - DATA_DIR=/data
    volumes:
      - tenant-data:/data/tenants:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - control-api

  preview-server:
    build:
      context: .
      dockerfile: packages/preview-server/Dockerfile
    environment:
      - DATA_DIR=/data
    volumes:
      - tenant-data:/data/tenants

  agent-service:
    build:
      context: .
      dockerfile: packages/agent-service/Dockerfile
    environment:
      - DATA_DIR=/data
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - tenant-data:/data/tenants
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3003:3003"
    depends_on:
      - control-api

  console:
    build:
      context: .
      dockerfile: packages/console/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - control-api
      - agent-service

volumes:
  app-data:
    driver: local
  tenant-data:
    driver: local
